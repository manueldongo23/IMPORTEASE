# ==============================
# SPRING BOOT WEB
# ==============================
spring.application.name=ImportEase
server.port=8082
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# ==============================
# JSP / JSTL
# ==============================
spring.mvc.view.prefix=/
spring.mvc.view.suffix=.jsp

# ==============================
# DATASOURCE
# ==============================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/importease_db?useSSL=false&serverTimezone=America/Lima}
# Cambiar a useSSL=true&requireSSL=true en produccion con certificado SSL
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==============================
# HIKARICP CONNECTION POOL
# ==============================
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.idle-timeout=600000

# ==============================
# JPA / HIBERNATE
# ==============================
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=false

# ==============================
# LOGGING
# ==============================
logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=OFF
