# ==============================
# SPRING BOOT WEB
# ==============================
spring.application.name=ImportEase
server.port=${PORT:8084}
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# ==============================
# JSP / JSTL
# ==============================
spring.mvc.view.prefix=/
spring.mvc.view.suffix=.jsp

# ==============================
# DATASOURCE
# ==============================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/importease_db?useSSL=false&serverTimezone=America/Lima&characterEncoding=UTF-8}
# Cambiar a useSSL=true&requireSSL=true en produccion con certificado SSL
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==============================
# HIKARICP CONNECTION POOL
# ==============================
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.pool-name=ImportEasePool
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.leak-detection-threshold=10000
spring.datasource.hikari.data-source-properties.cachePrepStmts=true
spring.datasource.hikari.data-source-properties.prepStmtCacheSize=250
spring.datasource.hikari.data-source-properties.prepStmtCacheSqlLimit=2048
spring.datasource.hikari.data-source-properties.useServerPrepStmts=true

# ==============================
# JPA / HIBERNATE
# ==============================
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.jdbc.batch_size=30
spring.jpa.properties.hibernate.query.timeout=30
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ==============================
# LOGGING
# ==============================
logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=OFF

# ==============================
# GZIP COMPRESSION
# ==============================
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json,image/svg+xml
server.compression.min-response-size=1024
