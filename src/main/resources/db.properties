# ====================================================================
# CONFIGURACIÓN DE BASE DE DATOS - ImportEase
# ====================================================================
# ⚠️ ADVERTENCIA DE SEGURIDAD CRÍTICA ⚠️
# ESTE ARCHIVO CONTIENE CREDENCIALES DE ACCESO A BASE DE DATOS.
# NO debe ser versionado en repositorios públicos.
#
# En producción se DEBE:
#   1. Crear un usuario dedicado (NUNCA root)
#   2. Establecer una contraseña fuerte
#   3. Restringir permisos al mínimo necesario (SELECT, INSERT, UPDATE, DELETE)
#   4. Limitar el host de conexión (NO usar '%')
#   5. Usar SSL/TLS en producción (useSSL=true)
#
# Ejemplo de setup seguro en MySQL:
#   CREATE USER 'importease_app'@'localhost' IDENTIFIED BY 'Tu_Clave_Segura_2026!';
#   GRANT SELECT, INSERT, UPDATE ON IMPORTEASE_DB.* TO 'importease_app'@'localhost';
#   FLUSH PRIVILEGES;
#
# Para desarrollo local, se recomienda usar H2 en memoria o sobrescribir
# estas propiedades via variables de entorno o system properties.
# ====================================================================
# ¡NUNCA USES 'root' CON CONTRASEÑA VACÍA EN PRODUCCIÓN!
# ====================================================================
db.url=jdbc:mysql://localhost:3306/importease_db?useSSL=false&serverTimezone=America/Lima
db.user=${DB_USER:root}
db.password=${DB_PASSWORD:}
