services:
  mysql:
    image: mysql:8.0
    container_name: importease-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_dev
      MYSQL_DATABASE: importease_db
      MYSQL_USER: importease_app
      MYSQL_PASSWORD: importease_dev
      TZ: America/Lima
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/importease_full_schema.sql:/docker-entrypoint-initdb.d/01_importease_full_schema.sql:ro
      - ./sql/seed_normativa.sql:/docker-entrypoint-initdb.d/02_seed_normativa.sql:ro
      - ./sql/upgrade_v4.0_flujo_guiado.sql:/docker-entrypoint-initdb.d/03_upgrade_v4_0_flujo_guiado.sql:ro
      - ./sql/upgrade_v4.1_normativa.sql:/docker-entrypoint-initdb.d/04_upgrade_v4_1_normativa.sql:ro
      - ./sql/upgrade_v5.0_fuentes_reales.sql:/docker-entrypoint-initdb.d/05_upgrade_v5_0_fuentes_reales.sql:ro
      - ./sql/upgrade_v5.1_password_reset.sql:/docker-entrypoint-initdb.d/06_upgrade_v5_1_password_reset.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot_dev"]
      interval: 10s
      timeout: 5s
      retries: 20

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: importease-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  app:
    build: .
    container_name: importease-app
    depends_on:
      mysql:
        condition: service_healthy
      mailhog:
        condition: service_started
    environment:
      DB_URL: jdbc:mysql://mysql:3306/importease_db?useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true
      DB_USER: importease_app
      DB_PASSWORD: importease_dev
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
      SMTP_USERNAME: ""
      SMTP_PASSWORD: ""
      SMTP_FROM: no-reply@importease.local
      SMTP_STARTTLS: "false"
      SMTP_SSL: "false"
      APP_PUBLIC_URL: http://localhost:8082/importease
      PERU_API_TOKEN: ""
    ports:
      - "8082:8080"

volumes:
  mysql_data:
